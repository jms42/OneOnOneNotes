{% extends 'base.html' %}
{% block title %}Edit {{ person.name }} — 1:1 Notes{% endblock %}
{% block content %}
<h4 class="mb-4">Edit Person</h4>

<form method="post">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Name <span class="text-danger">*</span></label>
      <input type="text" name="name" class="form-control" value="{{ person.name }}" required>
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Relationship</label>
      <select name="relationship" class="form-select">
        <option value="">— None —</option>
        {% for key, label in relationship_types %}
        <option value="{{ key }}" {{ 'selected' if person.get('relationship') == key }}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Title</label>
      <input type="text" name="title" class="form-control" value="{{ person.title or '' }}" placeholder="e.g. Senior Engineer">
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Team</label>
      <input type="text" name="team" class="form-control" value="{{ person.team or '' }}" placeholder="e.g. Platform">
    </div>
  </div>

  <div class="mb-4">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="5"
              placeholder="Background context, strengths, areas to watch, things to remember…">{{ person.notes or '' }}</textarea>
    <div class="form-text">Persistent context about this person — separate from any single meeting.</div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/people/{{ person.id }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
