{% extends 'base.html' %}
{% block title %}Decrypt Backup — 1:1 Notes{% endblock %}
{% block content %}
<h4 class="mb-2">Decrypt Backup</h4>
<p class="text-muted mb-4">Enter the password used to encrypt this backup file.</p>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="/import/decrypt">
  <input type="hidden" name="token" value="{{ token }}">
  <input type="hidden" name="mode" value="{{ mode }}">

  <div class="col-md-5 mb-4">
    <label class="form-label">Password <span class="text-danger">*</span></label>
    <input type="password" name="password" class="form-control" required autofocus autocomplete="off">
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-warning">Decrypt &amp; Import</button>
    <a href="/import" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
