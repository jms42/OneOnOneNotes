<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}1:1 Notes{% endblock %}</title>
  <!-- Apply saved theme before render to avoid flash -->
  <script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-bs-theme', saved);
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">1:1 Notes</a>
      <form class="d-flex me-2" action="/search" method="get" role="search">
        <input class="form-control form-control-sm me-1" type="search" name="q"
               placeholder="Search meetings…" style="width:200px"
               value="{{ request.args.get('q', '') }}">
        <button class="btn btn-outline-light btn-sm" type="submit">Search</button>
      </form>
      <div class="navbar-nav d-flex flex-row gap-2 align-items-center">
        <a class="nav-link" href="/people">People</a>
        <a class="nav-link" href="/relationships">Relationships</a>
        <a class="nav-link btn btn-outline-light btn-sm px-3" href="/meetings/new">+ New Meeting</a>
        <a class="nav-link btn btn-outline-secondary btn-sm px-3" href="/backup" title="Download backup">↓ Backup</a>
        <a class="nav-link btn btn-outline-secondary btn-sm px-3" href="/settings" title="Settings">⚙ Settings</a>
        <button id="themeToggle" class="btn btn-outline-light btn-sm" title="Toggle light/dark mode">☀️</button>
      </div>
    </div>
  </nav>
  <div class="container mt-4 pb-5">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const toggle = document.getElementById('themeToggle');
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-bs-theme', theme);
      toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    applyTheme(localStorage.getItem('theme') || 'light');
    toggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
